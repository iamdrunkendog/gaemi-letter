<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>개미레터 · 문서</title>
  <meta name="description" content="전달받은 링크로 여는 개미레터 문서입니다." />
  <meta property="og:title" content="개미레터 · 문서" />
  <meta property="og:description" content="전달받은 링크로 여는 개미레터 문서입니다." />
  <meta name="twitter:card" content="summary" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <style>@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #faf9f5;
  --bg-soft: #f4f0e6;
  --paper: #ffffff;
  --paper-warm: #fffaf0;
  --tx: #1c1b18;
  --tx2: #6a6760;
  --tx3: #9a9790;
  --bd: #e6e1d5;
  --bd-strong: #d8d0bf;
  --ac: #c38e1a;
  --ac-2: #d39a20;
  --blue: #5b82b8;
  --shadow: 0 24px 80px rgba(42, 31, 14, .08), 0 1px 0 rgba(42, 31, 14, .04);
  --max: 1120px;
  --article: 760px;
  color-scheme: light;
}

:root[data-theme='dark'] {
  --bg: #171619;
  --bg-soft: #201e1b;
  --paper: #201e1b;
  --paper-warm: #231c0e;
  --tx: #ede9df;
  --tx2: #b9b2a6;
  --tx3: #817a70;
  --bd: #2b2925;
  --bd-strong: #3a352e;
  --ac: #d39a20;
  --ac-2: #f2b537;
  --blue: #89aee3;
  --shadow: 0 24px 80px rgba(0,0,0,.3), 0 1px 0 rgba(255,255,255,.03);
  color-scheme: dark;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: radial-gradient(circle at top left, rgba(195,142,26,.12), transparent 34rem), var(--bg);
  color: var(--tx);
  line-height: 1.75;
  word-break: keep-all;
}
a { color: var(--blue); text-decoration-thickness: .08em; text-underline-offset: .18em; }
a:hover { color: var(--ac); }

.site-header {
  position: sticky; top: 0; z-index: 20;
  backdrop-filter: blur(16px);
  background: color-mix(in srgb, var(--bg) 86%, transparent);
  border-bottom: 1px solid var(--bd);
}
.header-inner { max-width: var(--max); margin: 0 auto; padding: 13px 22px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.brand { display: inline-flex; align-items: center; gap: 9px; color: var(--tx); text-decoration: none; font-weight: 800; letter-spacing: -.04em; }
.brand-avatar { width: 32px; height: 32px; border: 1px solid var(--bd); border-radius: 999px; object-fit: cover; background: var(--paper); box-shadow: 0 1px 0 rgba(0,0,0,.03); }
.ant-mark { width: 28px; height: 28px; border: 1px solid var(--bd); border-radius: 9px; display: grid; place-items: center; background: var(--paper); box-shadow: 0 1px 0 rgba(0,0,0,.03); }
.header-actions { display: flex; align-items: center; gap: 8px; }
.icon-button, .copy-button, .pill-link {
  min-height: 36px; border: 1px solid var(--bd); border-radius: 10px; background: var(--paper); color: var(--tx2);
  padding: 0 12px; font: inherit; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
}
.icon-button { width: 36px; padding: 0; }
.icon-button:hover, .copy-button:hover, .pill-link:hover { border-color: var(--bd-strong); color: var(--tx); background: var(--bg-soft); }

.hero { max-width: var(--max); margin: 0 auto; padding: 64px 22px 42px; border-bottom: 1px solid var(--bd); }
.eyebrow { display: flex; align-items: center; gap: 10px; color: var(--ac); font-size: 11px; font-weight: 800; letter-spacing: .11em; text-transform: uppercase; }
.eyebrow::before { content: ''; width: 28px; height: 2px; background: var(--ac); }
.hero h1 { max-width: 760px; margin: 16px 0 14px; font-size: clamp(32px, 6vw, 64px); line-height: 1.06; letter-spacing: -.065em; }
.hero p { max-width: 660px; margin: 0; color: var(--tx2); font-size: 18px; }

.letter-grid { max-width: var(--max); margin: 0 auto; padding: 34px 22px 72px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.card { display: flex; flex-direction: column; gap: 12px; min-height: 250px; padding: 22px; border: 1px solid var(--bd); border-radius: 22px; background: var(--paper); box-shadow: var(--shadow); text-decoration: none; color: var(--tx); transition: transform .18s ease, border-color .18s ease; }
.card:hover { transform: translateY(-3px); border-color: color-mix(in srgb, var(--ac), var(--bd) 50%); }
.card h2 { margin: 0; font-size: 23px; line-height: 1.28; letter-spacing: -.04em; }
.card p { margin: 0; color: var(--tx2); }
.meta, .tags { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; color: var(--tx3); font-size: 13px; }
.tag, .visibility { display: inline-flex; align-items: center; height: 26px; padding: 0 9px; border: 1px solid var(--bd); border-radius: 999px; background: var(--bg); color: var(--tx2); font-size: 12px; font-weight: 650; }
.visibility { color: var(--ac); background: var(--paper-warm); border-color: color-mix(in srgb, var(--ac), var(--bd) 70%); }
.card-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; color: var(--tx3); font-size: 13px; }

.page { max-width: var(--max); margin: 0 auto; padding: 34px 22px 80px; display: grid; grid-template-columns: minmax(0, 1fr) 250px; gap: 38px; align-items: start; }
.article-shell { min-width: 0; }
.article-head { padding: 36px 0 28px; border-bottom: 1px solid var(--bd); }
.article-head h1 { max-width: 820px; margin: 14px 0 14px; font-size: clamp(31px, 5vw, 54px); line-height: 1.12; letter-spacing: -.055em; }
.article-desc { max-width: 720px; color: var(--tx2); font-size: 18px; margin: 0 0 20px; }
.article { max-width: var(--article); padding-top: 22px; font-size: 17px; }
.article h2 { margin: 46px 0 14px; padding-top: 8px; font-size: 30px; line-height: 1.25; letter-spacing: -.045em; border-top: 1px solid var(--bd); }
.article h3 { margin: 34px 0 10px; font-size: 22px; line-height: 1.35; letter-spacing: -.035em; }
.article h4 { margin: 28px 0 8px; font-size: 18px; }
.article p, .article ul, .article ol, .article blockquote, .article table, .article pre { margin-top: 0; margin-bottom: 18px; }
.article ul, .article ol { padding-left: 1.35em; }
.article li + li { margin-top: 5px; }
.article blockquote { border-left: 3px solid var(--ac); padding: 12px 18px; background: var(--paper-warm); color: var(--tx2); border-radius: 0 14px 14px 0; }
.article code { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .9em; background: var(--bg-soft); border: 1px solid var(--bd); border-radius: 7px; padding: .1em .38em; word-break: break-all; }
.article pre { overflow-x: auto; padding: 16px; border-radius: 16px; border: 1px solid var(--bd); background: #1f1d1b; color: #ede9df; }
.article pre code { background: none; border: 0; color: inherit; padding: 0; }
.table-wrap { overflow-x: auto; margin: 22px 0; border: 1px solid var(--bd); border-radius: 16px; background: var(--paper); }
table { width: 100%; border-collapse: collapse; min-width: 620px; font-size: 15px; }
th, td { padding: 12px 14px; border-bottom: 1px solid var(--bd); vertical-align: top; }
th { text-align: left; color: var(--tx); background: var(--bg-soft); font-weight: 750; }
tr:last-child td { border-bottom: 0; }
.article hr { border: 0; border-top: 1px solid var(--bd); margin: 36px 0; }
.article img { max-width: 100%; border-radius: 16px; border: 1px solid var(--bd); }
.article input[type='checkbox'] { transform: translateY(1px); margin-right: 7px; }

.toc { position: sticky; top: 76px; padding: 18px; border: 1px solid var(--bd); border-radius: 18px; background: color-mix(in srgb, var(--paper) 92%, transparent); box-shadow: 0 10px 40px rgba(0,0,0,.04); }
.toc strong { display: block; margin-bottom: 10px; font-size: 13px; color: var(--tx3); letter-spacing: .08em; text-transform: uppercase; }
.toc a { display: block; padding: 6px 0; color: var(--tx2); text-decoration: none; font-size: 14px; line-height: 1.35; }
.toc a:hover { color: var(--ac); }

.site-footer { border-top: 1px solid var(--bd); color: var(--tx3); }
.footer-inner { max-width: var(--max); margin: 0 auto; padding: 24px 22px; font-size: 13px; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }

@media (max-width: 880px) {
  .page { display: block; }
  .toc { display: none; }
  .article { max-width: none; font-size: 16px; }
  .article h2 { font-size: 26px; }
  .hero { padding-top: 48px; }
}
@media (prefers-reduced-motion: reduce) {
  * { scroll-behavior: auto !important; transition: none !important; animation: none !important; }
}
</style>
  
</head>
<body>
<header class="site-header"><div class="header-inner">
  <a class="brand" href="/"><img class="brand-avatar" src="/assets/profile.jpg" alt="개미" width="32" height="32" /><span>개미레터</span></a>
  <div class="header-actions"><a class="icon-button" href="/admin/" title="관리자 페이지" aria-label="관리자 페이지"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M10 7.5V6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6a2 2 0 0 1-2-2v-1.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M4 12h10m0 0-3.2-3.2M14 12l-3.2 3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></a><button class="icon-button" id="themeToggle" title="테마 전환" aria-label="테마 전환">◐</button></div>
</div></header>
<main class="page"><section class="article-shell"><header class="article-head"><div class="eyebrow">Gaemi Letter</div><h1 id="letterTitle">개미레터를 불러오는 중</h1><p class="article-desc" id="letterDesc">Firestore에서 문서를 가져오고 있습니다.</p><div class="meta" id="letterMeta"></div><div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap"><button class="copy-button" id="copyButton">공유 링크 복사</button><a class="pill-link" href="/">처음으로</a></div></header><article class="article" id="letterBody"><p>잠시만 기다려주세요.</p></article></section><aside class="toc" id="letterToc"><strong>Contents</strong></aside></main>
<script>window.__gaemiFirebaseConfig = {
  "projectId": "gaemi-letter",
  "appId": "1:32998376971:web:0d4b83835d9c97dde8e90e",
  "storageBucket": "gaemi-letter.firebasestorage.app",
  "apiKey": "AIzaSyA2mvQyZlTrFU2Tm9ZjOIbDXVMyXW53f5M",
  "authDomain": "gaemi-letter.firebaseapp.com",
  "messagingSenderId": "32998376971"
};</script>
<script>
const cfg = window.__gaemiFirebaseConfig;
const slug = decodeURIComponent(location.pathname.replace(new RegExp('^/letters/'), '').replace(new RegExp('/$'), ''));
const titleEl = document.getElementById('letterTitle');
const descEl = document.getElementById('letterDesc');
const metaEl = document.getElementById('letterMeta');
const bodyEl = document.getElementById('letterBody');
const tocEl = document.getElementById('letterToc');
let loadedItem = null;
function esc(s='') { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(s='') { try { return new Intl.DateTimeFormat('ko-KR', { dateStyle: 'medium' }).format(new Date(s)); } catch { return s; } }
function v(field) {
  if (!field) return undefined;
  if ('stringValue' in field) return field.stringValue;
  if ('integerValue' in field) return Number(field.integerValue);
  if ('arrayValue' in field) return (field.arrayValue.values || []).map(v).filter(x => x !== undefined);
  if ('mapValue' in field) return Object.fromEntries(Object.entries(field.mapValue.fields || {}).map(([key, value]) => [key, v(value)]));
  if ('timestampValue' in field) return field.timestampValue;
  return undefined;
}
function bytesToBase64(bytes) { return btoa(String.fromCharCode(...bytes)); }
function base64ToBytes(b64) { return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }
async function keyFromPassword(password, saltB64, iterations = 210000) {
  const enc = new TextEncoder();
  const material = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt: base64ToBytes(saltB64), iterations, hash: 'SHA-256' }, material, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
}
async function decryptHtml(encryptedBody, password) {
  const key = await keyFromPassword(password, encryptedBody.salt, encryptedBody.iterations || 210000);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: base64ToBytes(encryptedBody.iv) }, key, base64ToBytes(encryptedBody.ciphertext));
  return new TextDecoder().decode(plain);
}
function buildToc() {
  const headings = [...bodyEl.querySelectorAll('h2, h3')].slice(0, 18);
  if (!headings.length) { tocEl.style.display = 'none'; return; }
  headings.forEach((h, i) => { if (!h.id) h.id = 'section-' + i; });
  tocEl.innerHTML = '<strong>Contents</strong>' + headings.map(h => '<a style="padding-left:' + (h.tagName === 'H3' ? '12px' : '0') + '" href="#' + esc(h.id) + '">' + esc(h.textContent) + '</a>').join('');
}
function renderMeta(item) {
  const tags = item.tags || [];
  metaEl.innerHTML = '<span>' + esc(fmtDate(item.date || '')) + '</span><span>약 ' + esc(item.readMin || '?') + '분</span><span class="visibility">' + esc(item.visibility || 'public') + '</span>' + tags.map(t => '<span class="tag">#' + esc(t) + '</span>').join('');
}
function renderBody(html) {
  bodyEl.innerHTML = html || '<p>본문이 비어 있습니다.</p>';
  buildToc();
}
function renderPasswordPrompt(item, message = '') {
  tocEl.style.display = 'none';
  bodyEl.innerHTML = '<div class="table-wrap" style="padding:18px"><h2>비밀번호가 필요한 개미레터입니다</h2><p>전달받은 비밀번호를 입력하면 브라우저에서 본문을 복호화합니다.</p><label>비밀번호 <input id="letterPassword" type="password" autocomplete="current-password" style="max-width:320px"></label><div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><button class="copy-button" id="unlockButton">열기</button><span class="tag" id="unlockStatus">' + esc(message) + '</span></div></div>';
  document.getElementById('unlockButton').addEventListener('click', async () => {
    const status = document.getElementById('unlockStatus');
    const password = document.getElementById('letterPassword').value;
    status.textContent = '확인 중...';
    try {
      const html = await decryptHtml(item.encryptedBody, password);
      status.textContent = '열림';
      renderBody(html);
    } catch (error) {
      status.textContent = '비밀번호가 맞지 않습니다.';
    }
  });
}
document.getElementById('copyButton').addEventListener('click', async event => {
  await navigator.clipboard.writeText(location.href);
  event.currentTarget.textContent = '복사됨';
});
async function loadLetter() {
  if (!slug) throw new Error('문서 slug가 없습니다.');
  const api = 'https://firestore.googleapis.com/v1/projects/' + encodeURIComponent(cfg.projectId) + '/databases/(default)/documents/letters/' + encodeURIComponent(slug) + '?key=' + encodeURIComponent(cfg.apiKey);
  const res = await fetch(api, { cache: 'no-store' });
  if (!res.ok) throw new Error(res.status === 404 || res.status === 403 ? '문서를 찾을 수 없거나 접근 권한이 없습니다.' : '문서를 불러오지 못했습니다. HTTP ' + res.status);
  const raw = await res.json();
  const fields = raw.fields || {};
  const item = Object.fromEntries(Object.entries(fields).map(([key, value]) => [key, v(value)]));
  loadedItem = item;
  document.title = (item.title || '개미레터') + ' · 개미레터';
  titleEl.textContent = item.title || slug;
  descEl.textContent = item.description || '';
  renderMeta(item);
  if (item.visibility === 'password') {
    if (!item.encryptedBody) throw new Error('비밀번호 문서 설정이 잘못되었습니다.');
    renderPasswordPrompt(item);
  } else {
    renderBody(item.bodyHtml || '<p>본문이 비어 있습니다.</p>');
  }
}
loadLetter().catch(error => {
  titleEl.textContent = '문서를 열 수 없습니다';
  descEl.textContent = '링크가 잘못되었거나 접근 권한이 없습니다.';
  bodyEl.innerHTML = '<p>' + esc(error.message) + '</p>';
  tocEl.style.display = 'none';
});
</script>
<footer class="site-footer"><div class="footer-inner"><span>개미가 정리해 보내는 작은 문서 배달함</span><span>Firestore → 개미레터</span></div></footer>
<script>
const root = document.documentElement;
const saved = localStorage.getItem('gaemi-letter-theme');
if (saved) root.dataset.theme = saved;
document.getElementById('themeToggle')?.addEventListener('click', () => {
  root.dataset.theme = root.dataset.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('gaemi-letter-theme', root.dataset.theme);
});
document.querySelectorAll('pre code').forEach(code => code.parentElement.setAttribute('tabindex','0'));
</script>
</body></html>
