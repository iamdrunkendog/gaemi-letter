  <style>@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #faf9f5;
  --bg-soft: #f4f0e6;
  --paper: #ffffff;
  --paper-warm: #fffaf0;
  --tx: #1c1b18;
  --tx2: #6a6760;
  --tx3: #9a9790;
  --bd: #e6e1d5;
  --bd-strong: #d8d0bf;
  --ac: #c38e1a;
  --ac-2: #d39a20;
  --blue: #5b82b8;
  --shadow: 0 24px 80px rgba(42, 31, 14, .08), 0 1px 0 rgba(42, 31, 14, .04);
  --max: 1120px;
  --article: 760px;
  color-scheme: light;
}

:root[data-theme='dark'] {
  --bg: #171619;
  --bg-soft: #201e1b;
  --paper: #201e1b;
  --paper-warm: #231c0e;
  --tx: #ede9df;
  --tx2: #b9b2a6;
  --tx3: #817a70;
  --bd: #2b2925;
  --bd-strong: #3a352e;
  --ac: #d39a20;
  --ac-2: #f2b537;
  --blue: #89aee3;
  --shadow: 0 24px 80px rgba(0,0,0,.3), 0 1px 0 rgba(255,255,255,.03);
  color-scheme: dark;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: radial-gradient(circle at top left, rgba(195,142,26,.12), transparent 34rem), var(--bg);
  color: var(--tx);
  line-height: 1.75;
  word-break: keep-all;
}
a { color: var(--blue); text-decoration-thickness: .08em; text-underline-offset: .18em; }
a:hover { color: var(--ac); }

.site-header {
  position: sticky; top: 0; z-index: 20;
  backdrop-filter: blur(16px);
  background: color-mix(in srgb, var(--bg) 86%, transparent);
  border-bottom: 1px solid var(--bd);
}
.header-inner { max-width: var(--max); margin: 0 auto; padding: 13px 22px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.brand { display: inline-flex; align-items: center; gap: 9px; color: var(--tx); text-decoration: none; font-weight: 800; letter-spacing: -.04em; }
.ant-mark { width: 28px; height: 28px; border: 1px solid var(--bd); border-radius: 9px; display: grid; place-items: center; background: var(--paper); box-shadow: 0 1px 0 rgba(0,0,0,.03); }
.header-actions { display: flex; align-items: center; gap: 8px; }
.icon-button, .copy-button, .pill-link {
  min-height: 36px; border: 1px solid var(--bd); border-radius: 10px; background: var(--paper); color: var(--tx2);
  padding: 0 12px; font: inherit; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
}
.icon-button { width: 36px; padding: 0; }
.icon-button:hover, .copy-button:hover, .pill-link:hover { border-color: var(--bd-strong); color: var(--tx); background: var(--bg-soft); }

.hero { max-width: var(--max); margin: 0 auto; padding: 64px 22px 42px; border-bottom: 1px solid var(--bd); }
.eyebrow { display: flex; align-items: center; gap: 10px; color: var(--ac); font-size: 11px; font-weight: 800; letter-spacing: .11em; text-transform: uppercase; }
.eyebrow::before { content: ''; width: 28px; height: 2px; background: var(--ac); }
.hero h1 { max-width: 760px; margin: 16px 0 14px; font-size: clamp(32px, 6vw, 64px); line-height: 1.06; letter-spacing: -.065em; }
.hero p { max-width: 660px; margin: 0; color: var(--tx2); font-size: 18px; }

.letter-grid { max-width: var(--max); margin: 0 auto; padding: 34px 22px 72px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.card { display: flex; flex-direction: column; gap: 12px; min-height: 250px; padding: 22px; border: 1px solid var(--bd); border-radius: 22px; background: var(--paper); box-shadow: var(--shadow); text-decoration: none; color: var(--tx); transition: transform .18s ease, border-color .18s ease; }
.card:hover { transform: translateY(-3px); border-color: color-mix(in srgb, var(--ac), var(--bd) 50%); }
.card h2 { margin: 0; font-size: 23px; line-height: 1.28; letter-spacing: -.04em; }
.card p { margin: 0; color: var(--tx2); }
.meta, .tags { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; color: var(--tx3); font-size: 13px; }
.tag, .visibility { display: inline-flex; align-items: center; height: 26px; padding: 0 9px; border: 1px solid var(--bd); border-radius: 999px; background: var(--bg); color: var(--tx2); font-size: 12px; font-weight: 650; }
.visibility { color: var(--ac); background: var(--paper-warm); border-color: color-mix(in srgb, var(--ac), var(--bd) 70%); }
.card-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; color: var(--tx3); font-size: 13px; }

.page { max-width: var(--max); margin: 0 auto; padding: 34px 22px 80px; display: grid; grid-template-columns: minmax(0, 1fr) 250px; gap: 38px; align-items: start; }
.article-shell { min-width: 0; }
.article-head { padding: 36px 0 28px; border-bottom: 1px solid var(--bd); }
.article-head h1 { max-width: 820px; margin: 14px 0 14px; font-size: clamp(31px, 5vw, 54px); line-height: 1.12; letter-spacing: -.055em; }
.article-desc { max-width: 720px; color: var(--tx2); font-size: 18px; margin: 0 0 20px; }
.article { max-width: var(--article); padding-top: 22px; font-size: 17px; }
.article h2 { margin: 46px 0 14px; padding-top: 8px; font-size: 30px; line-height: 1.25; letter-spacing: -.045em; border-top: 1px solid var(--bd); }
.article h3 { margin: 34px 0 10px; font-size: 22px; line-height: 1.35; letter-spacing: -.035em; }
.article h4 { margin: 28px 0 8px; font-size: 18px; }
.article p, .article ul, .article ol, .article blockquote, .article table, .article pre { margin-top: 0; margin-bottom: 18px; }
.article ul, .article ol { padding-left: 1.35em; }
.article li + li { margin-top: 5px; }
.article blockquote { border-left: 3px solid var(--ac); padding: 12px 18px; background: var(--paper-warm); color: var(--tx2); border-radius: 0 14px 14px 0; }
.article code { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .9em; background: var(--bg-soft); border: 1px solid var(--bd); border-radius: 7px; padding: .1em .38em; word-break: break-all; }
.article pre { overflow-x: auto; padding: 16px; border-radius: 16px; border: 1px solid var(--bd); background: #1f1d1b; color: #ede9df; }
.article pre code { background: none; border: 0; color: inherit; padding: 0; }
.table-wrap { overflow-x: auto; margin: 22px 0; border: 1px solid var(--bd); border-radius: 16px; background: var(--paper); }
table { width: 100%; border-collapse: collapse; min-width: 620px; font-size: 15px; }
th, td { padding: 12px 14px; border-bottom: 1px solid var(--bd); vertical-align: top; }
th { text-align: left; color: var(--tx); background: var(--bg-soft); font-weight: 750; }
tr:last-child td { border-bottom: 0; }
.article hr { border: 0; border-top: 1px solid var(--bd); margin: 36px 0; }
.article img { max-width: 100%; border-radius: 16px; border: 1px solid var(--bd); }
.article input[type='checkbox'] { transform: translateY(1px); margin-right: 7px; }

.toc { position: sticky; top: 76px; padding: 18px; border: 1px solid var(--bd); border-radius: 18px; background: color-mix(in srgb, var(--paper) 92%, transparent); box-shadow: 0 10px 40px rgba(0,0,0,.04); }
.toc strong { display: block; margin-bottom: 10px; font-size: 13px; color: var(--tx3); letter-spacing: .08em; text-transform: uppercase; }
.toc a { display: block; padding: 6px 0; color: var(--tx2); text-decoration: none; font-size: 14px; line-height: 1.35; }
.toc a:hover { color: var(--ac); }

.site-footer { border-top: 1px solid var(--bd); color: var(--tx3); }
.footer-inner { max-width: var(--max); margin: 0 auto; padding: 24px 22px; font-size: 13px; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }

@media (max-width: 880px) {
  .page { display: block; }
  .toc { display: none; }
  .article { max-width: none; font-size: 16px; }
  .article h2 { font-size: 26px; }
  .hero { padding-top: 48px; }
}
@media (prefers-reduced-motion: reduce) {
  * { scroll-behavior: auto !important; transition: none !important; animation: none !important; }
}
</style>
  
</head>

<header class="site-header"><div class="header-inner">

  <div class="header-actions"><a class="pill-link" href="./">목록</a><button class="icon-button" id="themeToggle" title="테마 전환" aria-label="테마 전환">◐</button></div>
</div></header>
<main><section class="hero"><div class="eyebrow">Gaemi Letter</div><h1>개미가 정리해 보내는 작은 문서 배달함</h1><p>Markdown으로 작성한 조사, 분석, 체크리스트를 웹에서 읽기 좋게 보여주고 링크로 나눕니다.</p></section><section class="letter-grid"><a class="card" href="letters/2026-06-24-leica-camera/"><div class="meta"><span>2026. 6. 24.</span><span>약 7분</span><span class="visibility">public</span></div><h2>라이카 카메라 현재 라인업과 구매 이유 조사</h2><p>현재 판매 중인 라이카 주요 모델과 사용자가 비싼 가격에도 라이카를 구매하는 이유를 정리한 개미레터입니다.</p><div class="tags"><span class="tag">#카메라</span><span class="tag">#시장조사</span><span class="tag">#브랜드</span></div><div class="card-footer"><span>열기</span><span>→</span></div></a></section></main>
<footer class="site-footer"><div class="footer-inner"><span>개미가 정리해 보내는 작은 문서 배달함</span><span>Markdown → 개미레터</span></div></footer>
<script>
const root = document.documentElement;
const saved = localStorage.getItem('gaemi-letter-theme');
if (saved) root.dataset.theme = saved;
document.getElementById('themeToggle')?.addEventListener('click', () => {
  root.dataset.theme = root.dataset.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('gaemi-letter-theme', root.dataset.theme);
});
document.querySelectorAll('pre code').forEach(code => code.parentElement.setAttribute('tabindex','0'));
</script>
